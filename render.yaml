# Render Blueprint
services:
  - type: web
    name: fenshu-registration
    runtime: node
    region: singapore
    plan: free
    healthCheckPath: /health
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SOCKET_IO_PATH
        value: "/socket.io"
      - key: DATABASE_URL
        fromDatabase:
          name: fenshu_db
          property: connectionString
      - key: ADMIN_TOTP_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: ADMIN_TOKEN_TTL
        value: "15m"
      - key: ADMIN_TOTP_PERIOD
        value: "30"
      - key: ADMIN_LOGIN_MAX_FAILURES
        value: "5"
      - key: ADMIN_LOGIN_LOCK_MINUTES
        value: "15"
      - key: ADMIN_COOKIE_SECURE
        value: "true"
      - key: ADMIN_COOKIE_SAME_SITE
        value: "strict"

databases:
  - name: fenshu_db
    plan: free
