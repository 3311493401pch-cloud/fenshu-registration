# Render Blueprint 配置文件
# 在 Render Dashboard 中连接 GitHub 仓库后自动识别此文件
# 文档: https://render.com/docs/blueprint-spec

services:
  # Web Service - Express 后端 + 前端静态文件
  - type: web
    name: fenshu-registration
    env: node
    region: singapore  # 新加坡节点（国内访问较快）
    plan: free         # 免费计划
    buildCommand: |
      cd client && npm ci && VITE_BASE=/ VITE_API_BASE=/api VITE_SOCKET_PATH=/socket.io VITE_ADMIN_PATH=/admin-2026 npm run build && cd ..
      cd server && npm ci && npx prisma generate && cd ..
    startCommand: cd server && npx prisma migrate deploy && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SOCKET_IO_PATH
        value: "/socket.io"
      - key: DATABASE_URL
        fromDatabase:
          name: fenshu-db
          property: connectionString
      - key: ADMIN_TOTP_SECRET
        sync: false        # 敏感信息，在 Render Dashboard 手动设置
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: ADMIN_TOKEN_TTL
        value: "15m"
      - key: ADMIN_TOTP_PERIOD
        value: "30"
      - key: ADMIN_LOGIN_MAX_FAILURES
        value: "5"
      - key: ADMIN_LOGIN_LOCK_MINUTES
        value: "15"
      - key: ADMIN_COOKIE_SECURE
        value: "true"
      - key: ADMIN_COOKIE_SAME_SITE
        value: "strict"

  # PostgreSQL 数据库
  - type: pserv
    name: fenshu-db
    env: pgsql
    plan: free
    disk:
      name: fenshu-db-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
